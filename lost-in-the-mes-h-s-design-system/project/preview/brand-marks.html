<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Brand / Marks</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:center">
  <!-- Full mark -->
  <div style="background:#070B12;border:1px solid #232E3D;border-radius:4px;padding:14px;text-align:center">
    <img src="../assets/logo-mark.svg" style="width:96px;height:96px;display:block;margin:0 auto"/>
    <div class="stamp" style="font-size:9px;margin-top:8px">MARK · 96</div>
  </div>
  <!-- 32 -->
  <div style="background:#070B12;border:1px solid #232E3D;border-radius:4px;padding:14px;text-align:center">
    <img src="../assets/logo-mark.svg" style="width:48px;height:48px;display:block;margin:0 auto"/>
    <div class="stamp" style="font-size:9px;margin-top:8px">MARK · 48</div>
  </div>
  <!-- Favicon -->
  <div style="background:#070B12;border:1px solid #232E3D;border-radius:4px;padding:14px;text-align:center">
    <img src="../assets/favicon.svg" style="width:24px;height:24px;display:block;margin:0 auto"/>
    <div class="stamp" style="font-size:9px;margin-top:8px">FAVICON · 24</div>
  </div>
  <!-- Inverted -->
  <div style="background:#F4F7F2;border:1px solid #232E3D;border-radius:4px;padding:14px;text-align:center">
    <svg width="48" height="48" viewBox="0 0 96 96"><circle cx="48" cy="48" r="20" fill="none" stroke="#04060A" stroke-dasharray="2 3" opacity="0.6"/><circle cx="48" cy="48" r="12" fill="none" stroke="#04060A"/><circle cx="48" cy="48" r="4" fill="#04060A"/></svg>
    <div class="stamp" style="font-size:9px;margin-top:8px;color:var(--bone-500)">INVERTED</div>
  </div>
</div>
</body></html>
