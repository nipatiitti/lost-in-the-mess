<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Spacing / Shadows + glows</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:8px">SHADOWS</div>
    <div style="background:var(--ink-200);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;box-shadow:0 1px 0 rgba(255,255,255,0.04) inset,0 1px 2px rgba(0,0,0,0.6)">
      <div class="mono" style="font-size:11px;color:var(--bone-200)">shadow-1</div>
    </div>
    <div style="background:var(--ink-200);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;box-shadow:0 4px 16px rgba(0,0,0,0.55),0 1px 0 rgba(255,255,255,0.04) inset">
      <div class="mono" style="font-size:11px;color:var(--bone-200)">shadow-2</div>
    </div>
    <div style="background:var(--ink-200);border:1px solid var(--border);border-radius:4px;padding:14px;box-shadow:0 24px 64px rgba(0,0,0,0.7),0 1px 0 rgba(255,255,255,0.05) inset">
      <div class="mono" style="font-size:11px;color:var(--bone-200)">shadow-3</div>
    </div>
  </div>
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:8px">GLOWS</div>
    <div style="background:var(--ink-100);border:1px solid var(--signal-300);border-radius:4px;padding:14px;margin-bottom:10px;box-shadow:0 0 0 1px rgba(109,247,181,0.45),0 0 16px rgba(109,247,181,0.35)">
      <div class="mono" style="font-size:11px;color:var(--signal-300)">glow-signal</div>
    </div>
    <div style="background:var(--ink-100);border:1px solid var(--uplink-300);border-radius:4px;padding:14px;margin-bottom:10px;box-shadow:0 0 0 1px rgba(255,179,71,0.45),0 0 16px rgba(255,179,71,0.35)">
      <div class="mono" style="font-size:11px;color:var(--uplink-300)">glow-uplink</div>
    </div>
    <div style="background:var(--ink-100);border:1px solid var(--lost-300);border-radius:4px;padding:14px;box-shadow:0 0 0 1px rgba(255,74,139,0.50),0 0 18px rgba(255,74,139,0.45)">
      <div class="mono" style="font-size:11px;color:var(--lost-300)">glow-lost</div>
    </div>
  </div>
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:8px">RULES</div>
    <div class="mono" style="font-size:11px;color:var(--bone-300);line-height:1.5">
      Shadows = surface depth.<br>
      Glows = energy / liveness.<br><br>
      Glow ONLY on:<br>
      · active node<br>
      · in-flight packet<br>
      · fresh alert<br><br>
      Never on hover.
    </div>
  </div>
</div>
</body></html>
