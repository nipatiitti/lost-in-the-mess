<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Components / Status chips</div>
<div style="display:flex;flex-wrap:wrap;gap:8px">
  <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;border:1px solid rgba(109,247,181,0.4);background:rgba(109,247,181,0.08);color:#6DF7B5;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:50%;background:#6DF7B5;box-shadow:0 0 6px #6DF7B5"></span>LINK OK
  </div>
  <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;border:1px solid rgba(255,179,71,0.4);background:rgba(255,179,71,0.08);color:#FFB347;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:50%;background:#FFB347;box-shadow:0 0 6px #FFB347"></span>RELAYING
  </div>
  <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;border:1px solid rgba(232,213,92,0.4);background:rgba(232,213,92,0.08);color:#E8D55C;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:50%;background:#E8D55C"></span>DEGRADED
  </div>
  <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;border:1px solid rgba(255,74,139,0.4);background:rgba(255,74,139,0.08);color:#FF4A8B;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:50%;background:#FF4A8B;box-shadow:0 0 6px #FF4A8B"></span>LOST
  </div>
  <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;border:1px solid #2E3B4D;background:transparent;color:#9BA59E;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:50%;background:#6B7670"></span>STANDBY
  </div>
  <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;border:1px solid rgba(111,195,255,0.4);background:rgba(111,195,255,0.08);color:#6FC3FF;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase">
    <span style="width:6px;height:6px;border-radius:50%;background:#6FC3FF"></span>SYNCING
  </div>
</div>
<div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px">
  <div style="padding:4px 8px;border:1px solid #232E3D;background:#111824;color:#F4F7F2;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;border-radius:2px">N-04</div>
  <div style="padding:4px 8px;border:1px solid #232E3D;background:#111824;color:#F4F7F2;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;border-radius:2px">2.4GHz</div>
  <div style="padding:4px 8px;border:1px solid #232E3D;background:#111824;color:#F4F7F2;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;border-radius:2px">-68dBm</div>
  <div style="padding:4px 8px;border:1px solid rgba(109,247,181,0.4);background:rgba(109,247,181,0.08);color:#6DF7B5;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;border-radius:2px">PRR 0.94</div>
  <div style="padding:4px 8px;border:1px solid #232E3D;background:#111824;color:#9BA59E;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;border-radius:2px">3 HOPS</div>
  <span class="stamp" style="font-size:9px;color:var(--bone-400);align-self:center">DATA TAGS</span>
</div>
</body></html>
