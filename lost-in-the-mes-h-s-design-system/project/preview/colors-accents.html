<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Colors / Accents</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:6px">SIGNAL — mesh health</div>
    <div style="display:flex;gap:2px">
      <div style="flex:1;height:56px;background:#C8FFE1;border-radius:2px 0 0 2px"></div>
      <div style="flex:1.5;height:56px;background:#6DF7B5"></div>
      <div style="flex:1;height:56px;background:#25D88C"></div>
      <div style="flex:1;height:56px;background:#0F8E5A;border-radius:0 2px 2px 0"></div>
    </div>
    <div class="mono" style="font-size:10px;margin-top:6px;color:var(--bone-300)">100 / <span style="color:#6DF7B5">300</span> / 500 / 700</div>
  </div>
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:6px">UPLINK — command/amber</div>
    <div style="display:flex;gap:2px">
      <div style="flex:1;height:56px;background:#FFE9C2;border-radius:2px 0 0 2px"></div>
      <div style="flex:1.5;height:56px;background:#FFB347"></div>
      <div style="flex:1;height:56px;background:#F08A0E"></div>
      <div style="flex:1;height:56px;background:#A05C00;border-radius:0 2px 2px 0"></div>
    </div>
    <div class="mono" style="font-size:10px;margin-top:6px;color:var(--bone-300)">100 / <span style="color:#FFB347">300</span> / 500 / 700</div>
  </div>
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:6px">DRIFT — info</div>
    <div style="display:flex;gap:2px">
      <div style="flex:1;height:56px;background:#CDE9FF;border-radius:2px 0 0 2px"></div>
      <div style="flex:1.5;height:56px;background:#6FC3FF"></div>
      <div style="flex:1;height:56px;background:#2E92E6"></div>
      <div style="flex:1;height:56px;background:#0F5A99;border-radius:0 2px 2px 0"></div>
    </div>
    <div class="mono" style="font-size:10px;margin-top:6px;color:var(--bone-300)">100 / <span style="color:#6FC3FF">300</span> / 500 / 700</div>
  </div>
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:6px">LOST — packet drop</div>
    <div style="display:flex;gap:2px">
      <div style="flex:1;height:56px;background:#FFD1E1;border-radius:2px 0 0 2px"></div>
      <div style="flex:1.5;height:56px;background:#FF4A8B"></div>
      <div style="flex:1;height:56px;background:#D81E66"></div>
      <div style="flex:1;height:56px;background:#8F0B41;border-radius:0 2px 2px 0"></div>
    </div>
    <div class="mono" style="font-size:10px;margin-top:6px;color:var(--bone-300)">100 / <span style="color:#FF4A8B">300</span> / 500 / 700</div>
  </div>
</div>
</body></html>
