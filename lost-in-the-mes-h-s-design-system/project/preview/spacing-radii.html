<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Spacing / Radii</div>
<div style="display:flex;gap:14px;align-items:flex-end">
  <div style="text-align:center">
    <div style="width:64px;height:64px;background:var(--ink-200);border:1px solid var(--border);border-radius:0"></div>
    <div class="stamp" style="margin-top:8px;font-size:9px">RADIUS-0</div>
    <div class="mono" style="font-size:10px;color:var(--bone-300)">0px</div>
  </div>
  <div style="text-align:center">
    <div style="width:64px;height:64px;background:var(--ink-200);border:1px solid var(--border);border-radius:2px"></div>
    <div class="stamp" style="margin-top:8px;font-size:9px">RADIUS-1</div>
    <div class="mono" style="font-size:10px;color:var(--bone-300)">2px ← default</div>
  </div>
  <div style="text-align:center">
    <div style="width:64px;height:64px;background:var(--ink-200);border:1px solid var(--border);border-radius:4px"></div>
    <div class="stamp" style="margin-top:8px;font-size:9px">RADIUS-2</div>
    <div class="mono" style="font-size:10px;color:var(--bone-300)">4px ← cards</div>
  </div>
  <div style="text-align:center">
    <div style="width:64px;height:64px;background:var(--ink-200);border:1px solid var(--border);border-radius:8px"></div>
    <div class="stamp" style="margin-top:8px;font-size:9px">RADIUS-3</div>
    <div class="mono" style="font-size:10px;color:var(--bone-300)">8px</div>
  </div>
  <div style="text-align:center">
    <div style="width:120px;height:32px;background:var(--ink-200);border:1px solid var(--border);border-radius:999px;display:flex;align-items:center;justify-content:center"><span class="stamp" style="font-size:9px">CHIP / PILL</span></div>
    <div class="stamp" style="margin-top:8px;font-size:9px">PILL</div>
    <div class="mono" style="font-size:10px;color:var(--bone-300)">999px</div>
  </div>
</div>
<div class="stamp" style="margin-top:14px;font-size:9px">DEFAULT IS TIGHT. SOFTEN ONLY WHEN THE ELEMENT IS HARDWARE-ADJACENT (BUTTONS, CHIPS).</div>
</body></html>
