<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Components / Inputs</div>
<div style="display:flex;flex-direction:column;gap:14px">
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:6px">SEARCH</div>
    <div style="display:flex;align-items:center;gap:8px;background:#0B1119;border:1px solid #232E3D;border-radius:2px;padding:8px 12px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7670" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input style="background:transparent;border:none;outline:none;color:#F4F7F2;font-family:var(--font-mono);font-size:13px;flex:1" placeholder="search node id, payload, route…" value="N-0">
      <span class="stamp" style="font-size:9px;color:var(--bone-500)">⌘K</span>
    </div>
  </div>
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:6px">FILTER ROW</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button style="padding:5px 10px;background:rgba(109,247,181,0.08);color:#6DF7B5;border:1px solid rgba(109,247,181,0.4);font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;cursor:pointer">ALL · 14</button>
      <button style="padding:5px 10px;background:transparent;color:#9BA59E;border:1px solid #232E3D;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;cursor:pointer">NOMINAL · 8</button>
      <button style="padding:5px 10px;background:transparent;color:#9BA59E;border:1px solid #232E3D;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;cursor:pointer">RELAY · 4</button>
      <button style="padding:5px 10px;background:transparent;color:#9BA59E;border:1px solid #232E3D;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px;cursor:pointer">LOST · 2</button>
    </div>
  </div>
  <div>
    <div class="stamp" style="font-size:9px;margin-bottom:6px">SLIDER · MIN PRR</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="position:relative;flex:1;height:6px;background:#111824;border-radius:1px">
        <div style="position:absolute;left:0;top:0;height:100%;width:62%;background:linear-gradient(to right,#FF4A8B,#FFB347 50%,#6DF7B5);border-radius:1px"></div>
        <div style="position:absolute;left:62%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#F4F7F2;border-radius:50%;border:2px solid #6DF7B5;box-shadow:0 0 0 1px rgba(109,247,181,0.4),0 0 12px rgba(109,247,181,0.4)"></div>
      </div>
      <div class="mono" style="font-size:13px;color:#6DF7B5">0.62</div>
    </div>
  </div>
</div>
</body></html>
