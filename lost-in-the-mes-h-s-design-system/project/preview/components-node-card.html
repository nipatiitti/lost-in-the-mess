<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Components / Node card</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
  <!-- Nominal -->
  <div style="position:relative;background:#0B1119;border:1px solid #232E3D;border-radius:4px;padding:14px">
    <svg width="100%" height="100%" style="position:absolute;inset:0;pointer-events:none" viewBox="0 0 100 100" preserveAspectRatio="none"><g stroke="#F4F7F2" stroke-width="0.4" opacity="0.4" fill="none"><path d="M2 2 L2 8 M2 2 L8 2"/><path d="M98 2 L98 8 M98 2 L92 2"/><path d="M2 98 L2 92 M2 98 L8 98"/><path d="M98 98 L98 92 M98 98 L92 98"/></g></svg>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-family:var(--font-mono);font-size:18px;color:#F4F7F2">N-04</div>
        <div class="stamp" style="font-size:9px;color:var(--bone-400);margin-top:2px">QUAD · 2.4GHz</div>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;border:1px solid rgba(109,247,181,0.4);background:rgba(109,247,181,0.08);color:#6DF7B5;font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em">
        <span style="width:4px;height:4px;border-radius:50%;background:#6DF7B5;box-shadow:0 0 6px #6DF7B5"></span>OK
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div style="font-family:var(--font-mono);font-size:28px;color:#6DF7B5;font-variant-numeric:tabular-nums">0.94</div>
      <div class="stamp" style="font-size:9px;color:var(--bone-400)">PRR</div>
    </div>
    <div style="margin-top:8px;height:3px;background:#111824;border-radius:1px;overflow:hidden"><div style="width:94%;height:100%;background:#6DF7B5"></div></div>
    <div class="mono" style="font-size:10px;color:var(--bone-300);margin-top:8px">-68dBm · 3 HOPS</div>
  </div>
  <!-- Degraded -->
  <div style="position:relative;background:#0B1119;border:1px solid #232E3D;border-radius:4px;padding:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-family:var(--font-mono);font-size:18px;color:#F4F7F2">N-09</div>
        <div class="stamp" style="font-size:9px;color:var(--bone-400);margin-top:2px">QUAD · 2.4GHz</div>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,179,71,0.4);background:rgba(255,179,71,0.08);color:#FFB347;font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em">
        <span style="width:4px;height:4px;border-radius:50%;background:#FFB347;box-shadow:0 0 6px #FFB347"></span>RELAY
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div style="font-family:var(--font-mono);font-size:28px;color:#FFB347;font-variant-numeric:tabular-nums">0.51</div>
      <div class="stamp" style="font-size:9px;color:var(--bone-400)">PRR</div>
    </div>
    <div style="margin-top:8px;height:3px;background:#111824;border-radius:1px;overflow:hidden"><div style="width:51%;height:100%;background:#FFB347"></div></div>
    <div class="mono" style="font-size:10px;color:var(--bone-300);margin-top:8px">-81dBm · 5 HOPS</div>
  </div>
  <!-- Lost -->
  <div style="position:relative;background:#0B1119;border:1px solid rgba(255,74,139,0.4);border-radius:4px;padding:14px;box-shadow:0 0 0 1px rgba(255,74,139,0.20),0 0 12px rgba(255,74,139,0.18)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-family:var(--font-mono);font-size:18px;color:#F4F7F2">N-11</div>
        <div class="stamp" style="font-size:9px;color:var(--bone-400);margin-top:2px">QUAD · 2.4GHz</div>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,74,139,0.4);background:rgba(255,74,139,0.08);color:#FF4A8B;font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em">
        <span style="width:4px;height:4px;border-radius:50%;background:#FF4A8B;box-shadow:0 0 6px #FF4A8B"></span>LOST
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div style="font-family:var(--font-mono);font-size:28px;color:#FF4A8B;font-variant-numeric:tabular-nums">0.18</div>
      <div class="stamp" style="font-size:9px;color:var(--bone-400)">PRR</div>
    </div>
    <div style="margin-top:8px;height:3px;background:#111824;border-radius:1px;overflow:hidden"><div style="width:18%;height:100%;background:#FF4A8B"></div></div>
    <div class="mono" style="font-size:10px;color:var(--bone-300);margin-top:8px">-94dBm · ∞ HOPS</div>
  </div>
</div>
</body></html>
