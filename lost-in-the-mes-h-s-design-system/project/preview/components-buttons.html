<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Components / Buttons</div>
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;gap:10px;align-items:center">
    <button style="background:#6DF7B5;color:#04060A;border:none;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:10px 16px;border-radius:2px;cursor:pointer">OPEN UPLINK →</button>
    <button style="background:#FFB347;color:#04060A;border:none;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:10px 16px;border-radius:2px;cursor:pointer">COMMIT ROUTE</button>
    <button style="background:transparent;color:#F4F7F2;border:1px solid #232E3D;font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:10px 16px;border-radius:2px;cursor:pointer">CANCEL</button>
    <span class="stamp" style="font-size:9px;color:var(--bone-400)">PRIMARY / WARM / SECONDARY</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button style="background:transparent;color:#FF4A8B;border:1px solid #FF4A8B;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:10px 16px;border-radius:2px;cursor:pointer">ABORT</button>
    <button style="background:transparent;color:#9BA59E;border:1px dashed #2E3B4D;font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:10px 16px;border-radius:2px;cursor:not-allowed">DISABLED</button>
    <button style="background:transparent;color:#6DF7B5;border:none;font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:10px 8px;border-radius:2px;cursor:pointer">TEXT BUTTON →</button>
    <span class="stamp" style="font-size:9px;color:var(--bone-400)">DANGER / DISABLED / GHOST</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button style="background:#0B1119;color:#F4F7F2;border:1px solid #232E3D;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:6px 10px;border-radius:2px;cursor:pointer">SMALL</button>
    <button style="background:#0B1119;color:#6DF7B5;border:1px solid #6DF7B5;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:6px 10px;border-radius:2px;cursor:pointer;box-shadow:0 0 0 1px rgba(109,247,181,0.45),0 0 16px rgba(109,247,181,0.35)">ACTIVE / GLOW</button>
    <button style="width:32px;height:32px;background:transparent;border:1px solid #232E3D;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F4F7F2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <span class="stamp" style="font-size:9px;color:var(--bone-400)">SMALL / ACTIVE / ICON</span>
  </div>
</div>
</body></html>
