<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Components / Tabs + toolbar</div>
<div style="background:#0B1119;border:1px solid #232E3D;border-radius:4px;overflow:hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #232E3D;padding:0 8px;background:#070B12">
    <div style="display:flex;align-items:center">
      <button style="position:relative;padding:14px 16px;background:transparent;color:#6DF7B5;border:none;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer">
        TOPOLOGY
        <span style="position:absolute;left:8px;right:8px;bottom:-1px;height:1px;background:#6DF7B5;box-shadow:0 0 8px #6DF7B5"></span>
      </button>
      <button style="padding:14px 16px;background:transparent;color:#9BA59E;border:none;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer">NODES · 14</button>
      <button style="padding:14px 16px;background:transparent;color:#9BA59E;border:none;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer">UPLINK</button>
      <button style="padding:14px 16px;background:transparent;color:#9BA59E;border:none;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer">LOG</button>
      <button style="padding:14px 16px;background:transparent;color:#9BA59E;border:none;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer">APPS</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;padding-right:6px">
      <button style="width:30px;height:30px;background:transparent;border:1px solid #232E3D;border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F4F7F2" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-9-9" /><polyline points="21 4 21 10 15 10"/></svg></button>
      <button style="width:30px;height:30px;background:transparent;border:1px solid #232E3D;border-radius:2px;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F4F7F2" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button style="padding:7px 12px;background:#6DF7B5;color:#04060A;border:none;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;border-radius:2px;cursor:pointer">SEND →</button>
    </div>
  </div>
  <div style="padding:18px;display:flex;align-items:center;justify-content:center;height:80px;color:var(--bone-400);font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em">CONTENT AREA</div>
</div>
</body></html>
