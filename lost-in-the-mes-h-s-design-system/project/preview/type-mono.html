<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="eyebrow">Type / Mono & stamps</div>
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="font-family:var(--font-mono);font-size:28px;font-variant-numeric:tabular-nums;color:var(--signal-300);font-weight:500">0.94</div>
    <div class="stamp">METRIC / 28 / MONO 500 / SIGNAL</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="font-family:var(--font-mono);font-size:16px;color:var(--bone-100)">N-07 → HUB · -68dBm · 3 hops</div>
    <div class="stamp">DATA / 16 / MONO 400</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="font-family:var(--font-mono);font-size:12px;letter-spacing:0.14em;color:var(--bone-300)">MESH.TOPO / N=14 / PRR.AVG 0.87</div>
    <div class="stamp">STAMP / 12 / MONO 400 / .14em</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:18px">
    <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--bone-400)">UTC 22:14:07 · LINK OK</div>
    <div class="stamp">CAPS / 10 / MONO 400 / .22em</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:18px;border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
    <code style="background:var(--ink-200);border:1px solid var(--border);padding:6px 10px;border-radius:2px;font-family:var(--font-mono);font-size:13px;color:var(--signal-300)">mesh route --via N-04</code>
    <div class="stamp">INLINE CODE</div>
  </div>
</div>
</body></html>
