[package]
name = "litm-app"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
litm-common = { path = "../common" }
litm-transport = { path = "../transport" }
litm-delivery = { path = "../delivery" }
litm-mesh = { path = "../mesh" }
tokio = { version = "1.37", features = ["full"] }
clap = { version = "4.4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
rand = "0.8"
socket2 = { version = "0.5", features = ["all"] }
sha2 = "0.10"
v4l = "0.14.0"
jpeg-encoder = "0.7.0"
